name: Frontend Code Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HTML5 Validation Check
        uses: cyisfor/html5validator-action@v1.0.0
        with:
          root: ./
          file-types: .html
